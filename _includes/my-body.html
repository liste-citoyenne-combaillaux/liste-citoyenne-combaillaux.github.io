<script>
// Close drawer when clicking on the sidebar backdrop
document.addEventListener('hy-push-state-load', function() {
  const backdrop = document.querySelector('.hy-drawer-backdrop') || document.querySelector('[data-hy-drawer-backdrop]');
  if (backdrop) {
    backdrop.addEventListener('click', function() {
      const drawerToggle = document.querySelector('hy-drawer input[type="checkbox"]');
      if (drawerToggle) {
        drawerToggle.checked = false;
      }
    });
  }
}, true);
</script>
